  const total=p.toc+p.tob;
  const tocR=(total>0?(p.toc/total*100).toFixed(0):0)+'%';
  const tobR=(total>0?(p.tob/total*100).toFixed(0):0)+'%';
  const wCls=total>=p.prev?'up':'down';

  // Channel bars
  let chBars='';
  if(p.ga4.ch.length>0){
    const maxR=Math.max(...p.ga4.ch.map(c=>c.r));
    chBars=p.ga4.ch.map(c=>`
      <div class="ch-row">
        <span class="ch-name">${c.n}</span>
        <div class="bg-bar"><div class="bg-fill" style="width:${Math.round(c.r/maxR*100)}%;background:${c.c}"></div></div>
        <span class="ch-val">${fmtK(c.r)}</span>
        <span style="width:32px;text-align:right;color:#73726c;font-size:11px">${c.p}件</span>
      </div>`).join('');
    if(p.ga4.note) chBars+=`<p style="font-size:11px;color:#73726c;margin:6px 0 0;line-height:1.5">${p.ga4.note}</p>`;
  } else {
    chBars=`<p style="font-size:12px;color:#73726c;padding:6px 0;margin:0">${p.ga4.note||'データなし'}</p>`;
  }

  // Items
  let itemRows='';
  if(p.ga4.items.length>0){
    itemRows=p.ga4.items.map(i=>`
      <div class="sr">
        <span class="sk">${i.n}</span>
        <span class="sv">${i.r>0?fmtK(i.r):'¥0（無料）'}</span>
        <span style="color:#73726c;font-size:11px;white-space:nowrap">${i.p}購入</span>
        <span style="color:#73726c;font-size:11px;white-space:nowrap">カート${i.c}</span>
      </div>`).join('');
  } else {
    itemRows=`<p style="font-size:12px;color:#73726c;padding:6px 0;margin:0">${p.ga4.note||'GA4データなし'}</p>`;
  }

  // SC
  let qRows='';
  if(p.sc.length>0){
    qRows=`<div style="display:flex;justify-content:space-between;font-size:10px;color:#73726c;margin-bottom:4px;padding-bottom:3px;border-bottom:0.5px solid rgba(0,0,0,.08)">
      <span style="flex:1">クエリ</span><span style="width:44px;text-align:right">クリック</span><span style="width:36px;text-align:right">CTR</span><span style="width:36px;text-align:right">順位</span>
    </div>`+p.sc.map(q=>`
      <div class="q-row">
        <span class="q-name">${q.q}</span>
        <span class="q-stat">${q.cl}</span>
        <span class="q-stat">${q.ct}</span>
        <span class="q-stat">${q.po}</span>
      </div>`).join('');
  } else {
    qRows=`<p style="font-size:12px;color:#73726c;padding:4px 0;margin:0">検索クエリデータなし</p>`;
  }

  const insCls=p.ins==='alert'?'alert-box':p.ins==='success'?'success-box':'info-box';
  const fixTag=p.ga4.ch.length>0
    ?`<span style="font-size:10px;background:#faeeda;color:#854F0B;padding:2px 7px;border-radius:10px">修正済</span>`
    :`<span style="font-size:10px;background:#f1efe8;color:#73726c;padding:2px 7px;border-radius:10px">GA4データなし</span>`;

  cardsEl.innerHTML+=`
  <div class="pcard${idx===0?' active':''}" id="card-${p.id}">
    <div class="brand-header">
      <div class="brand-dot" style="background:${p.color}"></div>
      <span class="brand-name">${p.name}</span>
      <span class="badge badge-${p.wowCls==='up'?'up':'dn'}">${p.wowStr} 前週比</span>
      ${fixTag}
    </div>
    <div class="pg">
      <div class="kpi"><div class="kl">週間売上合計</div><div class="kv">${fmt(total)}</div><div class="ks ${wCls}">前週 ${fmt(p.prev)}</div></div>
      <div class="kpi"><div class="kl">toC</div><div class="kv">${fmt(p.toc)}</div><div class="ks">${tocR}（${p.tocOrders.toLocaleString()}件）</div></div>
      <div class="kpi"><div class="kl">toB</div><div class="kv">${fmt(p.tob)}</div><div class="ks">${tobR}（${p.tobOrders}件）</div></div>
      <div class="kpi"><div class="kl">GA4 購買件数</div><div class="kv">${p.ga4.purchases>0?p.ga4.purchases.toLocaleString()+'件':'—'}</div><div class="ks">カート追加 ${p.ga4.cartTotal>0?p.ga4.cartTotal.toLocaleString():'—'}</div></div>
    </div>
    <div class="chart-wrap"><canvas id="ch-${p.id}"></canvas></div>
    <div class="row2" style="margin-top:.5rem">
      <div class="box">
        <div class="box-title">📱 GA4 主要商品（公式ECのみ）</div>
        ${itemRows}
      </div>
      <div class="box">
        <div class="box-title">📡 流入チャネル別・全商品合算（GA4）✅</div>
        ${chBars}
      </div>
    </div>
    <div class="row2" style="margin-top:8px">
      <div class="box">
        <div class="box-title">🔍 Search Console クエリ上位</div>
        ${qRows}
      </div>
      <div class="box">
        <div class="box-title">💡 週次インサイト</div>
        <div class="${insCls}">${p.insight}</div>
        <p class="fix-note">📝 <strong>修正メモ：</strong>${p.fix}</p>
      </div>
    </div>
  </div>`;
});

setTimeout(()=>{
  products.forEach(p=>{
    const el=document.getElementById('ch-'+p.id);
    if(!el)return;
    new Chart(el,{
      type:'bar',
      data:{labels:LABELS,datasets:[
        {label:'toC',data:p.tocDly.map(v=>+(v/1e6).toFixed(2)),backgroundColor:p.color+'cc',stack:'s'},
        {label:'toB',data:p.tobDly.map(v=>+(v/1e6).toFixed(2)),backgroundColor:p.color+'44',stack:'s',borderWidth:1,borderColor:p.color},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'top',labels:{boxWidth:8,font:{size:10}}}},
        scales:{
          x:{stacked:true,ticks:{autoSkip:false,font:{size:10}}},
          y:{stacked:true,grid:{color:'rgba(0,0,0,.06)'},ticks:{font:{size:10}}}
        }}
    });
  });
},50);
</script>
</body>
</html>
